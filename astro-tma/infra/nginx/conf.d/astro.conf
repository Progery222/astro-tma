server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ip-194-99-21-53-142250.vps.hosted-by-mvps.net;

    ssl_certificate     /etc/letsencrypt/live/ip-194-99-21-53-142250.vps.hosted-by-mvps.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ip-194-99-21-53-142250.vps.hosted-by-mvps.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /api/payments/webhook {
        limit_req zone=payments burst=5 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://backend:8000;
    }
}
